name: terraform

on:
  pull_request:
    paths:
      - ".github/workflows/terraform.yml"
      - ".pre-commit-config.yaml"
      - ".terraform-docs.yml"
      - ".terraform-version"
      - ".tflint.hcl"
      - "README.md"
      - "*.tf"
      - "modules/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform.yml"
      - ".pre-commit-config.yaml"
      - ".terraform-docs.yml"
      - ".terraform-version"
      - ".tflint.hcl"
      - "README.md"
      - "*.tf"
      - "modules/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy to prod"
        required: false
        type: string
        default: main

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.14.8"
  TF_IN_AUTOMATION: "true"
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  quality:
    name: quality-checks
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.20.0/terraform-docs-v0.20.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz terraform-docs
          sudo mv terraform-docs /usr/local/bin/terraform-docs

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

      - name: Check module docs
        run: terraform-docs markdown table --config .terraform-docs.yml --output-check modules/vnet

      - name: Validate dev workspace
        env:
          TF_VAR_admin_ssh_public_key: ${{ secrets.TF_ADMIN_SSH_PUBLIC_KEY }}
          TF_VAR_dev_admin_cidrs: ${{ vars.TF_DEV_ADMIN_CIDRS }}
          TF_VAR_prod_admin_cidrs: ${{ vars.TF_PROD_ADMIN_CIDRS }}
        run: |
          terraform init -backend=false
          TF_WORKSPACE=dev terraform validate

      - name: Validate prod workspace
        env:
          TF_VAR_admin_ssh_public_key: ${{ secrets.TF_ADMIN_SSH_PUBLIC_KEY }}
          TF_VAR_dev_admin_cidrs: ${{ vars.TF_DEV_ADMIN_CIDRS }}
          TF_VAR_prod_admin_cidrs: ${{ vars.TF_PROD_ADMIN_CIDRS }}
        run: |
          TF_WORKSPACE=prod terraform validate

  plan:
    name: plan-${{ matrix.environment }}
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform plan
        env:
          TF_VAR_admin_ssh_public_key: ${{ secrets.TF_ADMIN_SSH_PUBLIC_KEY }}
          TF_VAR_dev_admin_cidrs: ${{ vars.TF_DEV_ADMIN_CIDRS }}
          TF_VAR_prod_admin_cidrs: ${{ vars.TF_PROD_ADMIN_CIDRS }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=terraform.tfstate"
          terraform workspace select ${{ matrix.environment }} || terraform workspace new ${{ matrix.environment }}
          terraform plan -input=false -no-color

  apply-dev:
    name: apply-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: quality
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform apply
        env:
          TF_VAR_admin_ssh_public_key: ${{ secrets.TF_ADMIN_SSH_PUBLIC_KEY }}
          TF_VAR_dev_admin_cidrs: ${{ vars.TF_DEV_ADMIN_CIDRS }}
          TF_VAR_prod_admin_cidrs: ${{ vars.TF_PROD_ADMIN_CIDRS }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=terraform.tfstate"
          terraform workspace select dev || terraform workspace new dev
          terraform apply -auto-approve -input=false

  apply-prod:
    name: apply-prod
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform apply
        env:
          TF_VAR_admin_ssh_public_key: ${{ secrets.TF_ADMIN_SSH_PUBLIC_KEY }}
          TF_VAR_dev_admin_cidrs: ${{ vars.TF_DEV_ADMIN_CIDRS }}
          TF_VAR_prod_admin_cidrs: ${{ vars.TF_PROD_ADMIN_CIDRS }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER }}" \
            -backend-config="key=terraform.tfstate"
          terraform workspace select prod || terraform workspace new prod
          terraform apply -auto-approve -input=false
